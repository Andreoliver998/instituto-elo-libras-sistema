<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Instituto Elo LIBRAS{% endblock %}</title>
  <meta name="description"
    content="{% block description %}Sistema de inscrição do Instituto Elo Libras.{% endblock %}" />

  <link rel="icon" type="image/png"
    href="{{ static_url(request, 'assets/INSTITUTO ELO LIBRAS Ensino de LIBRAS Online2.0.0.png') }}" />
  <link rel="shortcut icon" type="image/png"
    href="{{ static_url(request, 'assets/INSTITUTO ELO LIBRAS Ensino de LIBRAS Online2.0.0.png') }}" />
  <link rel="apple-touch-icon"
    href="{{ static_url(request, 'assets/INSTITUTO ELO LIBRAS Ensino de LIBRAS Online2.0.0.png') }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500;1,700&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --color-primary: #0c0c1d;
      --color-primary-rgb: 12, 12, 29;
      --color-primary-hsl: 240 41% 8%;
      --color-secondary: #16162b;
      --color-secondary-rgb: 22, 22, 43;
      --color-secondary-hsl: 240 32% 13%;
      --color-accent: #995263;
      --color-accent-rgb: 153, 82, 99;
      --color-accent-hsl: 346 30% 46%;
      --color-neutral: #999999;
      --color-neutral-rgb: 153, 153, 153;
      --color-neutral-hsl: 0 0% 60%;
      --color-success: #4dc28a;
      --color-warning: #f1ba50;
      --color-error: #e8657c;
      --color-info: #6e8fff;

      --primary-10: rgba(var(--color-primary-rgb), 0.1);
      --primary-20: rgba(var(--color-primary-rgb), 0.2);
      --primary-40: rgba(var(--color-primary-rgb), 0.4);
      --primary-60: rgba(var(--color-primary-rgb), 0.6);
      --primary-80: rgba(var(--color-primary-rgb), 0.8);
      --accent-10: rgba(var(--color-accent-rgb), 0.1);
      --accent-20: rgba(var(--color-accent-rgb), 0.2);
      --accent-40: rgba(var(--color-accent-rgb), 0.4);
      --white-08: rgba(255, 255, 255, 0.08);
      --white-12: rgba(255, 255, 255, 0.12);
      --white-18: rgba(255, 255, 255, 0.18);

      --background-primary: var(--color-primary);
      --background-secondary: var(--color-secondary);
      --background-elevated: rgba(255, 255, 255, 0.03);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.72);
      --text-disabled: rgba(255, 255, 255, 0.45);
      --border-soft: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(255, 255, 255, 0.2);
      --hover-layer: rgba(255, 255, 255, 0.06);
      --active-layer: rgba(255, 255, 255, 0.09);

      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.24);
      --shadow-medium: 0 18px 60px rgba(0, 0, 0, 0.3);
      --shadow-strong: 0 30px 90px rgba(0, 0, 0, 0.46);
      --shadow-glow: 0 0 0 1px rgba(var(--color-accent-rgb), 0.35), 0 0 36px rgba(var(--color-accent-rgb), 0.22);

      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 28px;
      --radius-pill: 999px;

      --transition-fast: 140ms cubic-bezier(.2, .9, .25, 1);
      --transition-normal: 240ms cubic-bezier(.2, .9, .25, 1);
      --transition-slow: 420ms cubic-bezier(.2, .9, .25, 1);

      --font-body: "Geist", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --font-display: "Playfair Display", Georgia, "Times New Roman", serif;

      --type-h1-size: clamp(2rem, 2.4vw + 1rem, 3.4rem);
      --type-h2-size: clamp(1.6rem, 1.8vw + .9rem, 2.5rem);
      --type-h3-size: clamp(1.35rem, 1.2vw + .8rem, 1.9rem);
      --type-h4-size: 1.25rem;
      --type-h5-size: 1.05rem;
      --type-h6-size: .9rem;
      --type-body-lg: 1.12rem;
      --type-body: 1rem;
      --type-body-sm: .92rem;
      --type-caption: .74rem;
      --type-label: .82rem;
      --type-helper: .78rem;

      /* Backward-compatible aliases used by existing templates */
      --primary: var(--color-primary);
      --secondary: var(--color-secondary);
      --accent: #7acdbf;
      --neutral: var(--color-neutral);
      --bg: var(--background-primary);
      --panel: var(--background-secondary);
      --panel2: rgba(255, 255, 255, 0.02);
      --text: var(--text-primary);
      --muted: var(--text-secondary);
      --border: var(--border-soft);
      --border2: rgba(255, 255, 255, 0.08);
      --shadow: var(--shadow-strong);
      --focus: rgba(var(--color-accent-rgb), 0.25);
      --accentGlow: rgba(var(--color-accent-rgb), 0.22);
      --primaryGlow: rgba(var(--color-primary-rgb), 0.24);
      --r12: var(--radius-sm);
      --r16: var(--radius-md);
      --r20: var(--radius-lg);
      --font: var(--font-body);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--text-primary);
      background:
        radial-gradient(circle at 8% 6%, rgba(var(--color-accent-rgb), 0.42), transparent 30%),
        radial-gradient(circle at 85% 12%, rgba(255, 255, 255, 0.12), transparent 28%),
        radial-gradient(circle at 78% 84%, rgba(var(--color-accent-rgb), 0.24), transparent 35%),
        var(--background-primary);
      background-attachment: fixed;
      padding: 24px;
      font-size: var(--type-body);
      line-height: 1.6;
      letter-spacing: .01em;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 42vw;
      height: 42vw;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: drift 18s ease-in-out infinite alternate;
    }

    body::before {
      top: -18vw;
      right: -12vw;
      background: rgba(var(--color-accent-rgb), 0.22);
    }

    body::after {
      bottom: -20vw;
      left: -14vw;
      background: rgba(110, 143, 255, 0.12);
      animation-duration: 24s;
    }

    :focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(var(--color-accent-rgb), 0.35);
      border-radius: 10px;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      margin: 0;
      color: var(--text-primary);
      letter-spacing: .01em;
    }

    h1 {
      font-family: var(--font-display);
      font-size: var(--type-h1-size);
      font-weight: 700;
      line-height: 1.08;
    }

    h2 {
      font-family: var(--font-display);
      font-size: var(--type-h2-size);
      font-weight: 700;
      line-height: 1.14;
    }

    h3 {
      font-size: var(--type-h3-size);
      font-weight: 700;
      line-height: 1.22;
    }

    h4 {
      font-size: var(--type-h4-size);
      font-weight: 700;
      line-height: 1.25;
    }

    h5 {
      font-size: var(--type-h5-size);
      font-weight: 700;
      line-height: 1.3;
    }

    h6 {
      font-size: var(--type-h6-size);
      font-weight: 700;
      line-height: 1.35;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .wrap {
      min-height: calc(100vh - 48px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 620px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 35%),
        var(--background-secondary);
      box-shadow: var(--shadow-strong);
      overflow: hidden;
      position: relative;
      animation: fadeIn .6s ease both;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 8% 0%, rgba(var(--color-accent-rgb), 0.2), transparent 42%),
        radial-gradient(circle at 100% 100%, rgba(255, 255, 255, 0.08), transparent 40%);
      pointer-events: none;
    }

    .card>* {
      position: relative;
      z-index: 1;
    }

    .card--wide {
      max-width: 980px;
    }

    .card__header {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      gap: 14px;
      align-items: flex-start;
      background:
        radial-gradient(circle at 20% 0%, rgba(var(--color-accent-rgb), 0.22), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 90%);
    }

    .brand {
      width: 56px;
      height: 56px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: var(--shadow-glow);
      flex: 0 0 auto;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition-normal), box-shadow var(--transition-normal);
      animation: scaleIn .45s ease both;
    }

    .brand:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 0 1px rgba(var(--color-accent-rgb), 0.45), 0 0 44px rgba(var(--color-accent-rgb), 0.32);
    }

    .brand img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand--fallback {
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.22), transparent 48%),
        rgba(var(--color-accent-rgb), 0.95);
    }

    .head {
      flex: 1;
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: var(--type-caption);
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.88);
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(var(--color-accent-rgb), 0.35);
      background: rgba(var(--color-accent-rgb), 0.12);
      width: fit-content;
      margin-bottom: 10px;
      font-weight: 700;
      animation: slideUp .45s ease both;
    }

    .display-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(1.3rem, 1.8vw + .8rem, 2.25rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: .01em;
      background-image: linear-gradient(90deg, #ffffff 28%, rgba(255, 255, 255, 0.64) 72%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: fadeIn .55s ease both;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--text-secondary);
      font-size: var(--type-body-sm);
      line-height: 1.55;
      max-width: 60ch;
      animation: fadeIn .7s ease both;
    }

    .card__body {
      padding: 22px;
    }

    .muted {
      color: var(--text-secondary);
    }

    .lead {
      font-size: var(--type-body-lg);
      line-height: 1.7;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.92em;
    }

    .mono-wrap {
      word-break: break-all;
    }

    .req {
      color: #ffc4cf;
      font-weight: 800;
    }

    .help {
      font-size: var(--type-helper);
      line-height: 1.45;
      color: var(--text-secondary);
    }

    .fineprint {
      margin: 0;
      font-size: var(--type-helper);
      line-height: 1.5;
      color: var(--text-secondary);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.02));
      margin: 18px 0;
    }

    .note {
      border: 1px solid var(--border-soft);
      background: var(--background-elevated);
      border-radius: var(--radius-md);
      padding: 14px;
      box-shadow: var(--shadow-soft);
      transition: transform var(--transition-normal), border-color var(--transition-normal), box-shadow var(--transition-normal);
    }

    .note:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
    }

    .note--success {
      border-color: rgba(77, 194, 138, 0.42);
      background: rgba(77, 194, 138, 0.14);
    }

    .note--danger {
      border-color: rgba(232, 101, 124, 0.5);
      background: rgba(232, 101, 124, 0.14);
    }

    .note__title {
      font-weight: 800;
    }

    .note__text {
      margin-top: 4px;
      font-size: var(--type-body-sm);
      line-height: 1.5;
    }

    .kbd {
      display: inline-block;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-soft);
      background: rgba(255, 255, 255, 0.05);
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: .74rem;
      color: rgba(255, 255, 255, 0.94);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .span-all {
      grid-column: 1 / -1;
    }

    .actions,
    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      font-size: var(--type-label);
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.94);
    }

    .field input,
    .field select,
    .field textarea,
    input,
    select,
    textarea {
      width: 100%;
      min-height: 46px;
      padding: 11px 13px;
      border-radius: 14px;
      border: 1px solid var(--border-soft);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast), background var(--transition-fast);
    }

    .field input::placeholder,
    .field textarea::placeholder,
    input::placeholder,
    textarea::placeholder {
      color: var(--text-disabled);
    }

    .field input:hover,
    .field select:hover,
    .field textarea:hover,
    input:hover,
    select:hover,
    textarea:hover {
      border-color: var(--border-strong);
    }

    .field input:focus-visible,
    .field select:focus-visible,
    .field textarea:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      border-color: rgba(var(--color-accent-rgb), 0.75);
      box-shadow: 0 0 0 3px rgba(var(--color-accent-rgb), 0.25), 0 0 26px rgba(var(--color-accent-rgb), 0.16);
      background: rgba(255, 255, 255, 0.04);
    }

    .input-error,
    .field input[aria-invalid="true"],
    .field select[aria-invalid="true"],
    .field textarea[aria-invalid="true"] {
      border-color: rgba(232, 101, 124, 0.8);
      box-shadow: 0 0 0 3px rgba(232, 101, 124, 0.2);
    }

    .input-success {
      border-color: rgba(77, 194, 138, 0.8);
      box-shadow: 0 0 0 3px rgba(77, 194, 138, 0.2);
    }

    .btn,
    .btn-primary,
    .btn-secondary,
    .btn-outline,
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 44px;
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.95);
      appearance: none;
      -webkit-appearance: none;
      font: inherit;
      font-size: .87rem;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: transform var(--transition-fast), filter var(--transition-fast), box-shadow var(--transition-normal), border-color var(--transition-fast), background var(--transition-fast);
      user-select: none;
    }

    .btn:hover,
    .btn-primary:hover,
    .btn-secondary:hover,
    .btn-outline:hover,
    .btn-ghost:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-soft);
    }

    .btn:active,
    .btn-primary:active,
    .btn-secondary:active,
    .btn-outline:active,
    .btn-ghost:active {
      transform: translateY(1px);
      filter: brightness(.98);
    }

    .btn[aria-disabled="true"],
    .btn:disabled,
    .btn-primary:disabled,
    .btn-secondary:disabled,
    .btn-outline:disabled,
    .btn-ghost:disabled {
      opacity: .55;
      pointer-events: none;
    }

    .btn.loading,
    .btn[aria-busy="true"] {
      position: relative;
      color: transparent;
      pointer-events: none;
    }

    .btn.loading::after,
    .btn[aria-busy="true"]::after {
      content: "";
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: rgba(255, 255, 255, 0.95);
      position: absolute;
      animation: spin .7s linear infinite;
    }

    .btn-primary,
    .btn--cta {
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 35%), #ffffff;
      color: var(--color-primary);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.24), 0 0 24px rgba(255, 255, 255, 0.08);
    }

    .btn-primary:hover,
    .btn--cta:hover {
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28), 0 0 24px rgba(var(--color-accent-rgb), 0.24);
    }

    .btn-secondary,
    .btn--secondary {
      background: rgba(255, 255, 255, 0.02);
      border-color: var(--border-strong);
      color: rgba(255, 255, 255, 0.92);
    }

    .btn-outline {
      background: transparent;
      border-color: rgba(var(--color-accent-rgb), 0.58);
      color: rgba(255, 255, 255, 0.96);
    }

    .btn-outline:hover {
      background: rgba(var(--color-accent-rgb), 0.16);
      box-shadow: 0 0 0 1px rgba(var(--color-accent-rgb), 0.42), 0 0 28px rgba(var(--color-accent-rgb), 0.25);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.01);
      border-color: transparent;
      color: rgba(255, 255, 255, 0.82);
    }

    .btn-ghost:hover {
      background: var(--hover-layer);
      border-color: var(--border-soft);
    }

    .btn--danger {
      border: 1px solid rgba(232, 101, 124, 0.45);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), transparent 42%), rgba(232, 101, 124, 0.62);
      color: rgba(255, 255, 255, 0.98);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
    }

    .btn--lg {
      font-size: .93rem;
      padding: 14px 18px;
      min-height: 52px;
    }

    .btn--auto {
      width: auto;
      padding: 10px 13px;
      min-height: 40px;
    }

    .btn--sm {
      width: auto;
      padding: 8px 10px;
      min-height: 34px;
      border-radius: 12px;
      font-size: .72rem;
      letter-spacing: .03em;
    }

    .pillrow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .pill,
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(var(--color-accent-rgb), 0.35);
      background: rgba(var(--color-accent-rgb), 0.12);
      color: rgba(255, 255, 255, 0.92);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .badge--success {
      border-color: rgba(77, 194, 138, 0.42);
      background: rgba(77, 194, 138, 0.16);
    }

    .badge--warning {
      border-color: rgba(241, 186, 80, 0.45);
      background: rgba(241, 186, 80, 0.16);
    }

    .badge--error {
      border-color: rgba(232, 101, 124, 0.45);
      background: rgba(232, 101, 124, 0.16);
    }

    .badge--info {
      border-color: rgba(110, 143, 255, 0.45);
      background: rgba(110, 143, 255, 0.16);
    }

    .foot {
      margin-top: 12px;
      font-size: var(--type-helper);
      line-height: 1.5;
      color: var(--text-secondary);
    }

    .danger-zone {
      margin-top: 18px;
      border: 1px solid rgba(232, 101, 124, 0.42);
      background:
        radial-gradient(700px 220px at 0% 0%, rgba(232, 101, 124, 0.2), transparent 55%),
        rgba(255, 255, 255, 0.02);
      border-radius: var(--radius-md);
      padding: 14px;
    }

    .danger-zone__title {
      font-weight: 800;
      letter-spacing: .03em;
      text-transform: uppercase;
      font-size: .82rem;
    }

    .danger-zone__text {
      margin-top: 6px;
      font-size: var(--type-body-sm);
      line-height: 1.5;
      color: var(--text-secondary);
    }

    .table-wrap {
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      overflow: auto;
      background: rgba(255, 255, 255, 0.02);
      box-shadow: var(--shadow-soft);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      text-align: left;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(22, 22, 43, 0.88);
      backdrop-filter: blur(12px);
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-soft);
      font-size: .74rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      vertical-align: top;
      font-size: .84rem;
      color: rgba(255, 255, 255, 0.9);
    }

    tbody tr:nth-child(2n) {
      background: rgba(255, 255, 255, 0.02);
    }

    tbody tr:hover {
      background: rgba(var(--color-accent-rgb), 0.09);
    }

    .tooltip,
    [data-tooltip] {
      position: relative;
    }

    .tooltip::after,
    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%) translateY(6px);
      padding: 6px 10px;
      border-radius: 10px;
      background: rgba(8, 8, 18, 0.95);
      color: #fff;
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-soft);
      font-size: .72rem;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition-fast), transform var(--transition-fast), visibility var(--transition-fast);
      pointer-events: none;
    }

    .tooltip:hover::after,
    [data-tooltip]:hover::after {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .modal-backdrop,
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(7px);
      animation: fadeIn var(--transition-normal) both;
    }

    .modal,
    [role="dialog"] {
      animation: scaleIn var(--transition-normal) both;
      box-shadow: var(--shadow-strong);
    }

    .fade-in {
      animation: fadeIn .45s ease both;
    }

    .slide-up {
      animation: slideUp .45s ease both;
    }

    .slide-down {
      animation: slideDown .45s ease both;
    }

    .scale-in {
      animation: scaleIn .45s ease both;
    }

    .hover-glow:hover {
      box-shadow: 0 0 0 1px rgba(var(--color-accent-rgb), 0.5), 0 0 36px rgba(var(--color-accent-rgb), 0.22);
    }

    .admin-top,
    .admin-controls,
    .top-actions {
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .admin-controls input {
      min-width: 220px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(.96);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(0, 18px, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 14px;
      }

      .wrap {
        min-height: calc(100vh - 28px);
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card__header {
        padding: 18px 16px 14px;
      }

      .card__body {
        padding: 16px;
      }

      .brand {
        width: 48px;
        height: 48px;
      }
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body>
  <main class="wrap fade-in">
    <section class="card scale-in {% block card_class %}{% endblock %}">
      <header class="card__header">
        <div class="brand" aria-hidden="true">
          <img src="{{ static_url(request, 'assets/logo.png') }}"
            data-fallback="{{ static_url(request, 'favicon.svg') }}" alt=""
            onerror="this.onerror=null;var b=this.closest('.brand');if(b){b.classList.add('brand--fallback');}this.src=this.dataset.fallback;" />
        </div>
        <div class="head">
          {% block header %}
          <div class="eyebrow">Instituto Elo LIBRAS</div>
          <h1 class="display-title">{% block header_title %}Sistema{% endblock %}</h1>
          <p class="sub">{% block header_subtitle %}{% endblock %}</p>
          {% endblock %}
        </div>
      </header>

      <div class="card__body" id="main-content">
        {% block content %}{% endblock %}
      </div>
    </section>
  </main>
</body>

</html>
