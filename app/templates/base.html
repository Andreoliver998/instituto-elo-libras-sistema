<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Instituto Elo LIBRAS{% endblock %}</title>
  <meta name="description"
    content="{% block description %}Sistema de inscrição do Instituto Elo Libras.{% endblock %}" />

  <link rel="icon" type="image/png"
    href="{{ static_url(request, 'assets/INSTITUTO ELO LIBRAS Ensino de LIBRAS Online2.0.0.png') }}" />
  <link rel="shortcut icon" type="image/png"
    href="{{ static_url(request, 'assets/INSTITUTO ELO LIBRAS Ensino de LIBRAS Online2.0.0.png') }}" />
  <link rel="apple-touch-icon"
    href="{{ static_url(request, 'assets/INSTITUTO ELO LIBRAS Ensino de LIBRAS Online2.0.0.png') }}" />

  <style>
    :root {
      /* Official palette */
      --primary: #0C3A6B;
      --secondary: #143B6B;
      --accent: #7ACDBE;
      --neutral: #76736C;

      /* Derived tokens */
      --bg: var(--primary);
      --panel: var(--secondary);
      --panel2: #0f2f55;
      --text: #FFFFFF;
      --muted: rgba(255, 255, 255, .78);
      --border: rgba(255, 255, 255, .12);
      --border2: rgba(255, 255, 255, .10);
      --shadow: 0 24px 90px rgba(0, 0, 0, .45);
      --focus: rgba(122, 205, 190, .32);
      --accentGlow: rgba(122, 205, 190, .18);
      --primaryGlow: rgba(12, 58, 107, .22);

      /* Radius / Shadow */
      --r12: 12px;
      --r16: 16px;
      --r20: 20px;

      /* Typography */
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(900px 520px at 18% 8%, var(--accentGlow), transparent 58%),
        radial-gradient(760px 460px at 92% 10%, var(--primaryGlow), transparent 60%),
        var(--bg);
      padding: 22px;
    }

    :focus-visible {
      outline: 0;
      box-shadow: 0 0 0 4px var(--focus);
      border-radius: 10px;
    }

    /* Layout */
    .wrap {
      min-height: calc(100vh - 44px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .03), transparent 24%), var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r20);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card--wide {
      max-width: 840px;
    }

    .card__header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border2);
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .brand {
      width: 52px;
      height: 52px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(255, 255, 255, .14);
      box-shadow: 0 14px 34px var(--accentGlow);
      flex: 0 0 auto;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand--fallback {
      background:
        radial-gradient(circle at 28% 28%, rgba(255, 255, 255, .18), transparent 48%),
        var(--accent);
    }

    .head {
      flex: 1;
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, .86);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(122, 205, 190, .35);
      background: rgba(122, 205, 190, .10);
      width: fit-content;
      margin-bottom: 8px;
      font-weight: 750;
      letter-spacing: .2px;
      margin-top: 13px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: .2px;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.45;
    }

    .card__body {
      padding: 18px;
    }

    /* Components */
    .muted {
      color: var(--muted);
    }

    .lead {
      font-size: 15px;
      line-height: 1.6;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .mono-wrap {
      word-break: break-all;
    }

    .req {
      color: rgba(255, 255, 255, .88);
      font-weight: 950;
    }

    .help {
      font-size: 12.5px;
      line-height: 1.35;
      color: rgba(255, 255, 255, .66);
    }

    .fineprint {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(255, 255, 255, .62);
    }

    .divider {
      height: 1px;
      background: var(--border2);
      margin: 14px 0;
    }

    .note {
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(255, 255, 255, .03);
      border-radius: var(--r16);
      padding: 12px;
    }

    .note--success {
      border-color: rgba(122, 205, 190, .35);
      background: rgba(122, 205, 190, .10);
    }

    .note--danger {
      border-color: rgba(118, 115, 108, .55);
      background: rgba(118, 115, 108, .12);
    }

    .note__title {
      font-weight: 950;
    }

    .note__text {
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.45;
    }

    .kbd {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(255, 255, 255, .04);
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, .90);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .span-all {
      grid-column: 1 / -1;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      font-size: 13px;
      font-weight: 900;
      color: rgba(255, 255, 255, .92);
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .10);
      background: var(--panel2);
      color: var(--text);
      outline: none;
      transition: box-shadow .15s ease, border-color .15s ease, filter .12s ease;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: rgba(255, 255, 255, .48);
    }

    .field input:focus-visible,
    .field select:focus-visible,
    .field textarea:focus-visible {
      border-color: rgba(122, 205, 190, .70);
      box-shadow: 0 0 0 4px var(--focus);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(255, 255, 255, .04);
      color: rgba(255, 255, 255, .92);
      appearance: none;
      -webkit-appearance: none;
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      transition: transform .08s ease, filter .12s ease, box-shadow .12s ease, border-color .12s ease;
      user-select: none;
    }

    .btn:hover {
      filter: brightness(1.03);
      border-color: rgba(255, 255, 255, .16);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn[aria-disabled="true"] {
      opacity: .6;
      pointer-events: none;
    }

    .btn--cta {
      border: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, .18), transparent 38%), var(--accent);
      color: var(--primary);
      box-shadow: 0 16px 36px rgba(0, 0, 0, .22);
    }

    .btn--secondary {
      background: rgba(255, 255, 255, .02);
      border-color: rgba(255, 255, 255, .14);
      color: rgba(255, 255, 255, .92);
    }

    .btn--danger {
      border: 1px solid rgba(255, 255, 255, .16);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .10), transparent 42%),
        rgba(118, 115, 108, .52);
      color: rgba(255, 255, 255, .96);
      box-shadow: 0 16px 36px rgba(0, 0, 0, .22);
    }

    .btn--lg {
      font-size: 16px;
      padding: 14px 18px;
      border-radius: 16px;
    }

    .btn--auto {
      width: auto;
      padding: 10px 12px;
    }

    .btn--sm {
      width: auto;
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 12.5px;
    }

    .pillrow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(122, 205, 190, .30);
      background: rgba(122, 205, 190, .10);
      color: rgba(255, 255, 255, .86);
      font-size: 12px;
      font-weight: 750;
    }

    .foot {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(255, 255, 255, .60);
    }

    .danger-zone {
      margin-top: 16px;
      border: 1px solid rgba(118, 115, 108, .50);
      background:
        radial-gradient(700px 220px at 0% 0%, rgba(118, 115, 108, .16), transparent 55%),
        rgba(255, 255, 255, .02);
      border-radius: var(--r16);
      padding: 14px;
    }

    .danger-zone__title {
      font-weight: 950;
      letter-spacing: .2px;
    }

    .danger-zone__text {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.45;
      color: rgba(255, 255, 255, .74);
    }

    /* Mobile */
    @media (max-width: 820px) {
      body {
        padding: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card__header {
        padding: 16px;
      }

      .card__body {
        padding: 16px;
      }
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body>
  <main class="wrap">
    <section class="card {% block card_class %}{% endblock %}">
      <header class="card__header">
        <div class="brand" aria-hidden="true">
          <img src="{{ static_url(request, 'assets/logo.png') }}"
            data-fallback="{{ static_url(request, 'favicon.svg') }}" alt=""
            onerror="this.onerror=null;var b=this.closest('.brand');if(b){b.classList.add('brand--fallback');}this.src=this.dataset.fallback;" />
        </div>
        <div class="head">
          {% block header %}
          <div class="eyebrow">Instituto Elo LIBRAS</div>
          <!-- Deixar o <h1></h1 comentado até a segunda da proprietária se preferir que exista. -->
          <!-- <h1>{% block header_title %}Sistema{% endblock %}</h1> -->
          <p class="sub">{% block header_subtitle %}{% endblock %}</p>
          {% endblock %}
        </div>
      </header>

      <div class="card__body">
        {% block content %}{% endblock %}
      </div>
    </section>
  </main>
</body>

</html>
